name: release

# Publishes the package to npm when a version tag (v*) is pushed,
# and creates a matching GitHub Release. Requires an NPM_TOKEN secret.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG"

      - name: Validate registry and manifests
        run: |
          node lib/registry.js --validate
          node scripts/gen-manifests.js
          git diff --exit-code .claude-plugin .codex-plugin .cursor-plugin \
            || (echo "Manifests out of sync with skills.json" && exit 1)

      - name: Run tests
        run: node --test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
