<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" width="760" height="240" role="img" aria-label="gflow-skills - creative production skills for coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d11"/>
      <stop offset="1" stop-color="#15151b"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#e6e6ea"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6e6ea"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="760" height="240" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="759" height="239" rx="15.5" fill="none" stroke="#27272e" stroke-width="1"/>

  <!-- eyebrow -->
  <text x="380" y="58" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="13" letter-spacing="4" fill="#34d399">GOOGLE FLOW · CREATIVE SKILLS</text>

  <!-- wordmark -->
  <text x="380" y="122" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="62" font-weight="800" letter-spacing="-1.5" fill="url(#sheen)">gflow-skills</text>

  <!-- animated rule -->
  <rect x="230" y="142" width="300" height="2" fill="url(#rule)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="380" y="174" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="15" fill="#a1a1aa">Stunning design content pipelines for coding agents</text>

  <!-- pipeline of 12 skill nodes, pulsing in sequence -->
  <g fill="#34d399">
    <circle cx="248" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.00s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.00s" repeatCount="indefinite"/></circle>
    <circle cx="272" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.12s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.12s" repeatCount="indefinite"/></circle>
    <circle cx="296" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.24s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.24s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.36s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.36s" repeatCount="indefinite"/></circle>
    <circle cx="344" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.48s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.48s" repeatCount="indefinite"/></circle>
    <circle cx="368" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.60s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.60s" repeatCount="indefinite"/></circle>
    <circle cx="392" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.72s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.72s" repeatCount="indefinite"/></circle>
    <circle cx="416" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.84s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.84s" repeatCount="indefinite"/></circle>
    <circle cx="440" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.96s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="0.96s" repeatCount="indefinite"/></circle>
    <circle cx="464" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.08s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="1.08s" repeatCount="indefinite"/></circle>
    <circle cx="488" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.20s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="1.20s" repeatCount="indefinite"/></circle>
    <circle cx="512" cy="206" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.32s" repeatCount="indefinite"/><animate attributeName="r" values="3;5;3" dur="2.4s" begin="1.32s" repeatCount="indefinite"/></circle>
  </g>
</svg>
